<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>組織轉型中的當責領導力：從文化重塑到數位轉型的實踐框架｜完整全文</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', 'PingFang TC', 'Noto Sans TC', sans-serif;
            background: #f8fafc;
            color: #1e293b;
            line-height: 1.8;
        }

        /* ── Top bar ── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #e2e8f0;
            padding: 0 1.5rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        .topbar-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: #475569;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            font-size: 0.8125rem;
            font-weight: 500;
            color: #0284c7;
            text-decoration: none;
            border: 1px solid #bae6fd;
            background: #f0f9ff;
            padding: 0.3rem 0.85rem;
            border-radius: 9999px;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .back-btn:hover { background: #e0f2fe; }

        /* ── Content wrapper ── */
        .wrapper {
            max-width: 860px;
            margin: 2.5rem auto 5rem;
            padding: 0 1.5rem;
        }

        /* ── Loading / Error states ── */
        #loading {
            text-align: center;
            padding: 4rem 1rem;
            color: #94a3b8;
            font-size: 1rem;
        }
        #error-msg {
            display: none;
            text-align: center;
            padding: 4rem 1rem;
            color: #ef4444;
        }

        /* ── Markdown prose ── */
        .prose h1 { font-size: 1.75rem; font-weight: 900; color: #0f172a; margin: 2rem 0 1rem; line-height: 1.3; }
        .prose h2 { font-size: 1.375rem; font-weight: 800; color: #0c4a6e; margin: 2.5rem 0 0.75rem; padding-bottom: 0.4rem; border-bottom: 2px solid #bae6fd; }
        .prose h3 { font-size: 1.125rem; font-weight: 700; color: #0e7490; margin: 2rem 0 0.5rem; }
        .prose h4 { font-size: 1rem; font-weight: 700; color: #0369a1; margin: 1.5rem 0 0.4rem; }
        .prose p  { margin: 0.75rem 0; color: #334155; }
        .prose strong { font-weight: 700; color: #1e293b; }
        .prose em { font-style: italic; color: #475569; }

        .prose ul, .prose ol {
            margin: 0.75rem 0 0.75rem 1.5rem;
            color: #334155;
        }
        .prose li { margin: 0.3rem 0; }

        .prose blockquote {
            border-left: 4px solid #38bdf8;
            background: #f0f9ff;
            padding: 0.75rem 1.25rem;
            margin: 1.25rem 0;
            color: #0369a1;
            border-radius: 0 0.5rem 0.5rem 0;
        }

        .prose hr {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 2rem 0;
        }

        .prose a {
            color: #0284c7;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .prose a:hover { color: #0369a1; }

        .prose code {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            padding: 0.1em 0.4em;
            font-size: 0.875em;
            font-family: 'Consolas', monospace;
            color: #0e7490;
        }
        .prose pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 1.25rem;
            border-radius: 0.75rem;
            overflow-x: auto;
            margin: 1.25rem 0;
        }
        .prose pre code {
            background: none;
            border: none;
            padding: 0;
            color: inherit;
        }

        /* ── Tables ── */
        .prose table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.9rem;
            overflow-x: auto;
            display: block;
        }
        .prose thead { background: #0284c7; color: #fff; }
        .prose th {
            padding: 0.65rem 1rem;
            text-align: left;
            font-weight: 700;
            white-space: nowrap;
        }
        .prose td {
            padding: 0.6rem 1rem;
            border: 1px solid #e2e8f0;
            vertical-align: top;
            color: #334155;
        }
        .prose tbody tr:nth-child(even) td { background: #f8fafc; }
        .prose tbody tr:hover td { background: #f0f9ff; }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .prose h1 { font-size: 1.4rem; }
            .prose h2 { font-size: 1.15rem; }
            .wrapper { padding: 0 1rem; }
        }
    </style>
</head>
<body>

<nav class="topbar">
    <span class="topbar-title">當責領導力：文化重塑到數位轉型的實踐框架｜完整全文</span>
    <a href="../index.html" class="back-btn">← 返回主頁</a>
</nav>

<main class="wrapper">
    <div id="loading">載入中⋯</div>
    <div id="error-msg">無法載入文件，請確認檔案路徑或重新整理頁面。</div>
    <article id="content" class="prose" style="display:none;"></article>
</main>

<script>
    (async function () {
        const mdPath = '../SHARE_md/260330-當責文化轉型研究與實踐框架.md';
        const loadingEl = document.getElementById('loading');
        const errorEl   = document.getElementById('error-msg');
        const contentEl = document.getElementById('content');

        try {
            const res = await fetch(mdPath);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const text = await res.text();

            marked.setOptions({ breaks: false, gfm: true });
            contentEl.innerHTML = marked.parse(text);

            loadingEl.style.display = 'none';
            contentEl.style.display = 'block';

            // Open external links in new tab
            contentEl.querySelectorAll('a[href^="http"]').forEach(a => {
                a.setAttribute('target', '_blank');
                a.setAttribute('rel', 'noopener noreferrer');
            });
        } catch (err) {
            console.error(err);
            loadingEl.style.display = 'none';
            errorEl.style.display   = 'block';
        }
    })();
</script>

</body>
</html>
